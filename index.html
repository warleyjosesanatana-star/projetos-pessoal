<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Heloiza ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#ff6a88,#ff99ac);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
}

.container{
background:rgba(255,255,255,0.2);
padding:40px;
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

button{
padding:15px 30px;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
background:white;
color:#ff4d6d;
margin-top:20px;
}

button:hover{
transform:scale(1.1);
}

#mensagem{
margin-top:20px;
font-size:22px;
}

</style>

</head>

<body>

<div class="container">

<h1>❤️ De Wally para Heloiza ❤️</h1>

<p>Tenho uma surpresa para você...</p>

<button onclick="mostrarMensagem()">Clique aqui 💌</button>

<div id="mensagem"></div>

</div>

<script>

function mostrarMensagem(){

document.getElementById("mensagem").innerHTML =
"Heloiza, você é a melhor coisa que já aconteceu na minha vida. Eu te amo ❤️"

}

</script>

</body>
</html>
